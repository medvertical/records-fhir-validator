
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm install
      - run: npm run oss:audit-validator
      - run: npm run typecheck
      - run: npm run build
      - run: npm run oss:smoke-validator
